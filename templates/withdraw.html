<!DOCTYPE html>
<html>
<head>
    <title>Withdraw Earnings</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at top, #0a0f1f, #000000 70%);
            color: #ffffff;
            text-align: center;
        }
        .glow-bg {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, #00ffcc22, transparent 60%),
                radial-gradient(circle at 80% 70%, #ff00ff22, transparent 60%);
            z-index: -1;
        }
        h1 {
            margin-top: 40px;
            font-size: 34px;
            color: #00ffcc;
            text-shadow: 0 0 12px #00ffcc, 0 0 25px #ff00ff;
        }
        .card {
            width: 420px;
            margin: 40px auto;
            padding: 25px;
            background: #0d1224;
            border-radius: 18px;
            box-shadow: 0 0 25px #00ffcc33;
            border: 1px solid #1f2937;
            text-align: left;
        }
        label {
            display: block;
            text-align: left;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ffcc00;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-bottom: 15px;
            background: #111827;
            color: #ffffff;
            font-size: 14px;
            box-shadow: 0 0 12px #00ffcc33 inset;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: linear-gradient(90deg, #00ffcc, #00aaff);
            color: #000;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 0 18px #00ffccaa;
            border: none;
        }
        .btn:hover {
            box-shadow: 0 0 25px #00aaffaa;
        }
        .back-btn {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 18px;
            border-radius: 999px;
            background: linear-gradient(90deg, #ff00aa, #ff6600);
            color: white;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 0 18px #ff00ffaa;
        }
        .back-btn:hover {
            box-shadow: 0 0 25px #ff6600aa;
        }
        .flash-wrap {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<div class="glow-bg"></div>

<h1>💸 Withdraw Your Earnings</h1>

<div class="card">
    <div class="flash-wrap">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div style="
                  padding:10px;
                  border-radius:10px;
                  margin-bottom:8px;
                  background: {% if category == 'success' %} #00ffcc33 {% else %} #ff006633 {% endif %};
                  color:white;
                  font-weight:bold;
                  text-shadow:0 0 8px #000;">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
    </div>

    <form method="POST" action="{{ url_for('withdraw') }}">
        <label>Current Balance</label>
        <div style="margin-bottom:12px; color:#00ffcc; font-weight:bold;">
            {{ "%.2f"|format(user.balance) }} EUR (Minimum withdrawal: 500 EUR)
        </div>

        <label>Amount to Withdraw</label>
        <input type="number" name="amount" step="0.01" placeholder="Enter amount">

        <label>Select Withdrawal Method</label>
        <select name="method">
            <option>M‑Pesa</option>
            <option>Airtel Money</option>
            <option>Bank Transfer</option>
            <option>Visa / Mastercard</option>
            <option>PayPal</option>
            <option>Skrill</option>
            <option>Neteller</option>
            <option>Wise</option>
            <option>Revolut</option>
            <option>CashApp</option>
            <option>Western Union</option>
            <option>WorldRemit</option>
            <option>Crypto — BTC</option>
            <option>Crypto — ETH</option>
            <option>Crypto — USDT (TRC20)</option>
            <option>Crypto — USDT (ERC20)</option>
            <option>Crypto — BNB</option>
            <option>Crypto — TRX</option>
        </select>

        <label>Account / Wallet Number</label>
        <input type="text" name="account" placeholder="Enter account or wallet ID">

        <button class="btn">Submit Withdrawal</button>
    </form>
</div>

<a class="back-btn" href="{{ url_for('trade') }}">⬅ Back to Dashboard</a>

</body>
</html>
