<!DOCTYPE html>
<html>
<head>
    <title>Survey Home</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #ff00ff, #000020);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #ffffff;
        }
        .card {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.6);
            text-align: center;
        }
        h1 {
            font-size: 40px;
            background: linear-gradient(90deg, #00eaff, #ffcc00, #ff00ff);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        a {
            display: inline-block;
            margin-top: 25px;
            padding: 15px 35px;
            background: linear-gradient(45deg, #00ff88, #00eaff);
            color: #000;
            font-size: 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.7);
        }
        a:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Neon Survey Levels</h1>
        <a href="/surveys">Start Survey</a>
    </div>
</body>
</html>
