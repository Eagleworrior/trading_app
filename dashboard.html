{% extends "base.html" %}

{% block content %}

<!-- YOUR LIVE MARKET CHART CODE GOES HERE -->
<div class="card">
    <h2>Live Market Chart</h2>
</div>

<div id="tradingview_chart" style="height: 600px;"></div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    new TradingView.widget({
        "width": "100%",
        "height": 600,
        "symbol": "BTCUSDT",
        "interval": "1",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "container_id": "tradingview_chart"
    });
</script>

{% endblock %}
