<!DOCTYPE html>
<html>
<head>
    <title>Survey Completed</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at bottom, #00ff88, #000010);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 255, 200, 0.6);
        }
        h1 {
            font-size: 32px;
            background: linear-gradient(90deg, #00ff88, #00eaff);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 15px;
        }
        p {
            font-size: 16px;
            color: #ccccff;
            margin: 6px 0;
        }
        .btn {
            display: inline-block;
            margin: 10px 8px 0;
            padding: 12px 26px;
            font-size: 15px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            color: #000;
        }
        .btn-main {
            background: linear-gradient(45deg, #ffcc00, #ff8800);
            box-shadow: 0 0 20px rgba(255, 200, 0, 0.8);
        }
        .btn-back {
            background: linear-gradient(45deg, #ccccff, #00eaff);
            box-shadow: 0 0 15px rgba(0, 200, 255, 0.7);
        }
        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Survey Completed!</h1>
        <p>You earned {{ survey.payout }} USDT from <strong>{{ survey.title }}</strong>.</p>
        <p>Your new survey balance is: {{ balance }} USDT.</p>

        <a class="btn btn-main" href="/surveys">More Surveys</a>
        <a class="btn btn-back"href="/trade"
 >⬅ Back to Dashboard</a>
    </div>
</body>
</html>
