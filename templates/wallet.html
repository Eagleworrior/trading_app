{% extends "base.html" %}
{% block title %}Wallet - EAGLEX{% endblock %}

{% block content %}
<div class="panel">
    <h2>💼 Wallet Overview</h2>

    <p style="font-size:16px; color:#cfd3ff;">
        Visual balances for training and interface preview.
    </p>

    <div style="margin-top:15px;">
        <div style="font-size:20px; color:#00ff88; margin-bottom:8px;">
            Real Account: <b>$0</b>
        </div>
        <div style="font-size:20px; color:#00eaff;">

        <a class="btn btn-secondary" href="{{ url_for('trade') }}">🎯 Start Trading</a>
