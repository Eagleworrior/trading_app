<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EAGLEX Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #0a0f24, #000);
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        .login-box {
            width: 380px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
            animation: glow 3s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 15px #00eaff; }
            to   { box-shadow: 0 0 35px #00eaff; }
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 28px;
            font-weight: 600;
            color: #00eaff;
            text-shadow: 0 0 10px #00eaff;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 10px #00eaff;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #00eaff, #0077ff);
            color: #000;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #00eaff;
        }

        .links {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .links a {
            color: #00eaff;
            text-decoration: none;
            transition: 0.3s;
        }

        .links a:hover {
            text-shadow: 0 0 10px #00eaff;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>EAGLEX LOGIN</h2>

        <form method="POST">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Sign In</button>
        </form>

        <div class="links">
            <p><a href="#">Forgot your password</a></p>
            <p>Don't have an account? <a href="#">Register</a></p>
        </div>
    </div>

</body>
</html>
