<!DOCTYPE html>
<html>
<head>
    <title>Survey Question</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #ff0080, #000010);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 90%;
            max-width: 700px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            padding: 30px 40px;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.5);
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .top-bar span:first-child {
            color: #00eaff;
        }
        .top-bar span:last-child {
            color: #ffcc00;
        }
        .question-text {
            font-size: 24px;
            margin-bottom: 25px;
            background: linear-gradient(90deg, #ffcc00, #00ff88);
            -webkit-background-clip: text;
            color: transparent;
        }
        button.option-btn {
            width: 100%;
            background: linear-gradient(90deg, #00eaff, #00ff88);
            border: none;
            padding: 14px 20px;
            margin: 8px 0;
            font-size: 18px;
            color: #000;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 255, 200, 0.6);
        }
        button.option-btn:nth-child(2) {
            background: linear-gradient(90deg, #ffcc00, #ff8800);
        }
        button.option-btn:nth-child(3) {
            background: linear-gradient(90deg, #ff00ff, #ff0066);
        }
        button.option-btn:hover {
            transform: scale(1.03);
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: linear-gradient(45deg, #ccccff, #00eaff);
            color: #000;
            font-size: 14px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            transform: scale(1.03);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <span>Level {{ level }}</span>
            <span>Question {{ index + 1 }}</span>
        </div>

        <div class="question-text">{{ question }}</div>

        <form method="POST">
            {% for option in options %}
                <button class="option-btn" type="submit" name="answer" value="{{ option }}">{{ option }}</button>
            {% endfor %}
        </form>

        <a class="back-link" href="/">⬅ Back to Dashboard</a>


    </div>
</body>
</html>
