<!DOCTYPE html>
<html>
<head>
    <title>Level Complete</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at bottom, #00ff88, #000010);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 40px 50px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 255, 200, 0.6);
        }
        h1 {
            font-size: 38px;
            background: linear-gradient(90deg, #00ff88, #00eaff);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            color: #ccccff;
            margin-bottom: 25px;
        }
        a.main-btn, a.back-btn {
            display: inline-block;
            margin: 8px 10px;
            padding: 12px 28px;
            font-size: 16px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            color: #000;
        }
        a.main-btn {
            background: linear-gradient(45deg, #ffcc00, #ff8800);
            box-shadow: 0 0 20px rgba(255, 200, 0, 0.8);
        }
        a.back-btn {
            background: linear-gradient(45deg, #ccccff, #00eaff);
            box-shadow: 0 0 15px rgba(0, 200, 255, 0.7);
        }
        a:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Level {{ level }} Complete!</h1>
        <p>You’ve unlocked Level {{ next_level }}.</p>

        <a class="main-btn" href="/surveys/level/{{ next_level }}">Go to Level {{ next_level }}</a>
        <a class="back-btn" href="/">⬅ Back to Dashboard</a>

    </div>
</body>
</html>
