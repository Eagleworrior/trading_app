<!DOCTYPE html>
<html>
<head>
    <title>Level {{ level }} — Question {{ qnum }}</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at top, #050816, #000000 70%);
            color: #ffffff;
            text-align: center;
        }

        .glow-bg {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, #00ffcc22, transparent 60%),
                radial-gradient(circle at 80% 70%, #ff00ff22, transparent 60%);
            z-index: -1;
        }

        h1 {
            text-align: center;
            font-size: 26px;
            color: #ff66ff;
            text-shadow: 0 0 12px #ff66ff, 0 0 25px #00ffcc;
            margin-top: 40px;
        }

        .meta {
            font-size: 13px;
            color: #9ca3af;
            text-align: center;
            margin-bottom: 10px;
        }

        .card {
            width: 480px;
            margin: 40px auto;
            padding: 25px;
            background: #0b1020;
            border-radius: 18px;
            box-shadow: 0 0 25px #00ffcc33;
            border: 1px solid #1f2937;
            text-align: left;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: #111827;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            width: {{ progress }}%;
            background: linear-gradient(90deg, #00ffcc, #00aaff);
            box-shadow: 0 0 12px #00ffccaa;
        }

        .question-text {
            font-size: 18px;
            margin-bottom: 25px;
            color: #e5e7eb;
            line-height: 1.5;
        }

        .choice {
            margin-bottom: 15px;
            padding: 14px 14px;
            border-radius: 12px;
            background: #111827;
            cursor: pointer;
            border: 1px solid #1f2937;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .choice:hover {
            box-shadow: 0 0 14px #00ffcc55;
            border-color: #00ffcc;
        }

        .choice input {
            transform: scale(1.3);
        }

        .btn {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: linear-gradient(90deg, #00ffcc, #00aaff);
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 0 18px #00ffccaa;
            border: none;
        }

        .btn:hover {
            box-shadow: 0 0 25px #00aaffaa;
        }

        .back {
            margin-top: 20px;
            text-align: center;
        }

        .back a {
            color: #ff66ff;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="glow-bg"></div>

<h1>Level {{ level }} — Question {{ qnum }} / {{ total }}</h1>
<div class="meta">Answer one question at a time to unlock endless levels and earn rewards.</div>

<div class="card">

    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>

    <div class="question-text">
        {{ q.question }}
    </div>

    <form method="POST" action="">
        <label class="choice">
            <input type="radio" name="choice" value="{{ q.choice1 }}" required>
            {{ q.choice1 }}
        </label>

        <label class="choice">
            <input type="radio" name="choice" value="{{ q.choice2 }}">
            {{ q.choice2 }}
        </label>

        <label class="choice">
            <input type="radio" name="choice" value="{{ q.choice3 }}">
            {{ q.choice3 }}
        </label>

        <label class="choice">
            <input type="radio" name="choice" value="{{ q.choice4 }}">
            {{ q.choice4 }}
        </label>

        <button class="btn">Submit & Next</button>
    </form>

    <div class="back">
        <a href="{{ url_for('surveys_dashboard') }}">⬅ Back to Survey Dashboard</a>
    </div>

</div>

</body>
</html>
