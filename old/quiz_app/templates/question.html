<!DOCTYPE html>
<html>
<head>
    <title>Level {{ level }} - Question {{ index+1 }}</title>

    <style>
        body {
            background: #0d0d0d;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 40px;
            text-align: center;
        }

        .box {
            background: #1a1a1a;
            border: 3px solid #00eaff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px #00eaff;
            width: 70%;
            margin: auto;
        }

        h1 {
            color: #ffea00;
            font-size: 32px;
        }

        label {
            font-size: 22px;
            display: block;
            margin: 10px;
            cursor: pointer;
        }

        .btn {
            background: #00eaff;
            color: #000;
            padding: 15px 40px;
            font-size: 22px;
            border: none;
            border-radius: 10px;
            margin-top: 20px;
            cursor: pointer;
        }

        .btn:hover {
            background: #00bcd4;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>{{ question }}</h1>

    <form method="POST">
        {% for option in options %}
            <label>
                <input type="radio" name="answer" value="{{ option }}" required>
                {{ option }}
            </label>
        {% endfor %}

        <button class="btn" type="submit">Next</button>
    </form>
</div>

</body>
</html>
