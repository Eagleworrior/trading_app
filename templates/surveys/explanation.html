<!DOCTYPE html>
<html>
<head>
    <title>Explanation</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at top, #050816, #000000 70%);
            color: #ffffff;
            text-align: center;
        }

        .card {
            width: 520px;
            margin: 80px auto;
            padding: 30px;
            background: #0b1020;
            border-radius: 20px;
            box-shadow: 0 0 30px #00ffcc55;
            border: 1px solid #1f2937;
        }

        .correct {
            color: #00ffcc;
            font-size: 20px;
            margin-bottom: 20px;
            text-shadow: 0 0 12px #00ffcc;
        }

        .explanation {
            font-size: 16px;
            line-height: 1.6;
            color: #e5e7eb;
            margin-bottom: 30px;
        }

        .btn {
            padding: 14px 20px;
            border-radius: 12px;
            background: linear-gradient(90deg, #00ffcc, #00aaff);
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 0 20px #00ffccaa;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="correct">
        {{ "Correct!" if correct else "Wrong!" }}
    </div>

    <div class="explanation">
        {{ explanation }}
    </div>

    <a class="btn" href="{{ url_for('survey_question', level=level, qnum=qnum + 1) }}">
        Next Question →
    </a>
</div>

</body>
</html>
