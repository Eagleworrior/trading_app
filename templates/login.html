<!DOCTYPE html>
<html>
<head>
    <title>Login - EAGLEX</title>
    <style>
        body {
            background:#050712;
            font-family:'Segoe UI',sans-serif;
            color:#e3e3e3;
            margin:0;
            padding:0;
        }
        .box {
            max-width:420px;
            margin:100px auto;
            background:#0d0f17;
            padding:25px;
            border-radius:14px;
            border:1px solid #1f2333;
            box-shadow:0 0 25px rgba(0,0,0,0.7);
            animation:fadeIn 0.6s ease;
        }
        h2 {
            color:#00eaff;
            text-shadow:0 0 10px rgba(0,238,255,0.6);
            text-align:center;
        }
        input {
            width:100%;
            padding:12px;
            margin-top:10px;
            border-radius:8px;
            border:1px solid #2b3148;
            background:#141722;
            color:#e3e3e3;
        }
        button {
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            font-weight:bold;
            cursor:pointer;
            background:linear-gradient(90deg,#00ff88,#00cc66);
            color:#000;
            box-shadow:0 0 15px rgba(0,255,120,0.5);
            transition:0.3s;
        }
        button:hover { transform:scale(1.05); }
        .flash {
            background:#3b1f1f;
            border:1px solid #ff4d4d;
            color:#ffb3b3;
            padding:10px;
            border-radius:8px;
            margin-bottom:10px;
        }
        @keyframes fadeIn {
            from {opacity:0; transform:translateY(10px);}
            to {opacity:1; transform:translateY(0);}
        }
    </style>
</head>
<body>

<div class="box">
    <h2>EAGLEX Login</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
