<!DOCTYPE html>
<html>
<head>
    <title>Trading App</title>
    <style>
        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        nav {
            background: #161b22;
            padding: 15px;
            display: flex;
            gap: 20px;
            border-bottom: 1px solid #30363d;
        }

        nav a {
            color: #58a6ff;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: #161b22;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #30363d;
            margin-bottom: 20px;
        }

        .back-btn {
            background: #00eaff;
            color: #000;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
            display: inline-block;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #00bcd4;
            transform: scale(1.05);
        }

        input, select {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #e6edf3;
            border-radius: 6px;
        }

        button {
            background: #238636;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #2ea043;
        }
    </style>
</head>
<body>

{% include "components/back_button.html" %}

<nav>
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <a href="{{ url_for('wallet') }}">Wallet</a>
    <a href="{{ url_for('logout') }}">Logout</a>
</nav>

<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="card">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
