<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}EAGLEX{% endblock %}</title>
    <style>
        body {
            background: radial-gradient(circle at top, #101530, #050712 55%);
            color:#e3e3e3;
            font-family:'Segoe UI', system-ui, sans-serif;
            margin:0;
            padding:20px;
        }

        h1, h2, h3 {
            font-family: 'Segoe UI Semibold', system-ui;
            letter-spacing:0.5px;
        }

        h1 {
            font-size:34px;
            color:#00eaff;
            text-shadow:0 0 18px rgba(0,238,255,0.9);
        }

        h2 {
            font-size:26px;
            color:#ff6bff;
            text-shadow:0 0 14px rgba(255,107,255,0.8);
        }

        h3 {
            font-size:22px;
            color:#00ff88;
            text-shadow:0 0 10px rgba(0,255,136,0.7);
        }

        .panel {
            background:linear-gradient(145deg,#0b0f1a,#111729);
            border-radius:16px;
            border:1px solid rgba(0,238,255,0.18);
            box-shadow:0 0 30px rgba(0,0,0,0.8);
            padding:22px;
            margin-bottom:24px;
        }

        .label {
            font-size:15px;
            color:#9fa8ff;
            text-transform:uppercase;
            letter-spacing:1px;
        }

        input, select {
            width:100%;
            padding:10px;
            margin-top:6px;
            border-radius:10px;
            border:1px solid #2b3148;
            background:#141722;
            color:#e3e3e3;
            font-size:15px;
        }

        .btn {
            display:inline-block;
            padding:11px 18px;
            border-radius:10px;
            border:none;
            cursor:pointer;
            font-weight:600;
            font-size:15px;
            text-decoration:none;
            transition:0.25s;
        }

        .btn-primary {
            background:linear-gradient(90deg,#00eaff,#00ff88);
            color:#000;
            box-shadow:0 0 16px rgba(0,238,255,0.7);
        }

        .btn-secondary {
            background:linear-gradient(90deg,#ff6bff,#ffb86c);
            color:#000;
            box-shadow:0 0 16px rgba(255,107,255,0.7);
        }

        .btn:hover {
            transform:translateY(-1px) scale(1.03);
            box-shadow:0 0 22px rgba(0,0,0,0.9);
        }

        .tag {
            display:inline-block;
            padding:4px 10px;
            border-radius:999px;
            font-size:12px;
            background:rgba(0,238,255,0.12);
            color:#00eaff;
            border:1px solid rgba(0,238,255,0.4);
        }

        .nav-link {
            display:inline-block;
            margin-right:10px;
            color:#00eaff;
            text-decoration:none;
            font-size:14px;
        }

        .nav-link:hover {
            text-decoration:underline;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
