<!DOCTYPE html>
<html>
<head>
    <title>{{ survey.title }}</title>

    <style>
        body {
            background: #0d0d0d;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #00eaff;
            font-size: 40px;
            margin-bottom: 30px;
        }

        .question-box {
            background: #1a1a1a;
            border: 2px solid #00eaff;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 0 10px #00eaff;
        }

        .question-box p {
            font-size: 20px;
            color: #ffea00;
        }

        label {
            font-size: 18px;
            color: #ffffff;
        }

        .submit-btn {
            background: #00eaff;
            color: #000;
            padding: 15px 30px;
            font-size: 22px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: block;
            margin: 30px auto;
            font-weight: bold;
        }

        .submit-btn:hover {
            background: #00bcd4;
        }
    </style>
</head>

<body>

<h1>{{ survey.title }}</h1>

<form method="POST">
    {% for q in survey.questions %}
        <div class="question-box">
            <p><strong>{{ loop.index }}. {{ q.question }}</strong></p>

            {% for option in q.options %}
                <label>
                    <input type="radio" name="q{{ loop.index }}" value="{{ option }}" required>
                    {{ option }}
                </label><br>
            {% endfor %}
        </div>
    {% endfor %}

    <button class="submit-btn" type="submit">Submit Answers</button>
</form>

</body>
</html>
